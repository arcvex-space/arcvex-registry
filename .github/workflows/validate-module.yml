name: Validate and Merge Module PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - registry.json

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    name: Validate module entry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base registry (NOT PR code)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch PR registry.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${{ github.repository }}/contents/registry.json?ref=${{ github.event.pull_request.head.sha }}" \
            --jq '.content' | base64 -d > /tmp/pr_registry.json

      - name: Find and validate new entry
        id: validate_entry
        run: |
          node << 'SCRIPT'
          const fs = require('fs')

          const base = JSON.parse(fs.readFileSync('registry.json', 'utf-8'))
          const pr   = JSON.parse(fs.readFileSync('/tmp/pr_registry.json', 'utf-8'))

          const baseIds = new Set(base.modules.map(m => m.id))
          const newEntries = pr.modules.filter(m => !baseIds.has(m.id))

          const errors = []

          if (newEntries.length === 0) {
            errors.push('Nenhuma entry nova encontrada no PR.')
          } else if (newEntries.length > 1) {
            errors.push(`PR deve conter apenas uma entry por vez (encontradas: ${newEntries.length}).`)
          }

          if (errors.length > 0) {
            fs.writeFileSync('/tmp/errors.txt', errors.join('\n'))
            console.error(errors.join('\n'))
            process.exit(1)
          }

          const entry = newEntries[0]

          const required = ['id', 'name', 'version', 'author', 'description', 'category', 'download_url']
          for (const field of required) {
            if (!entry[field]) errors.push(`• ${field}: campo obrigatório`)
          }

          if (entry.id && !/^[a-z0-9-]{2,50}$/.test(entry.id)) {
            errors.push('• id: formato inválido (apenas letras minúsculas, números e hífens, 2–50 chars)')
          }
          if (entry.version && !/^\d+\.\d+\.\d+$/.test(entry.version)) {
            errors.push('• version: formato inválido (esperado: x.y.z)')
          }
          if (entry.download_url && !/^https:\/\/github\.com\/.+\/releases\/download\/.+\.zip$/.test(entry.download_url)) {
            errors.push('• download_url: deve ser um URL de GitHub Release (.zip)')
          }

          if (errors.length > 0) {
            fs.writeFileSync('/tmp/errors.txt', errors.join('\n'))
            console.error(errors.join('\n'))
            process.exit(1)
          }

          fs.writeFileSync('/tmp/entry.json', JSON.stringify(entry, null, 2))

          const out = process.env.GITHUB_OUTPUT
          fs.appendFileSync(out, `module_id=${entry.id}\n`)
          fs.appendFileSync(out, `module_version=${entry.version}\n`)
          console.log(`✓ Estrutura válida: ${entry.id} v${entry.version}`)
          SCRIPT

      - name: Download and validate ZIP
        run: |
          DOWNLOAD_URL=$(node -e "const e=require('/tmp/entry.json'); console.log(e.download_url)")

          HTTP_STATUS=$(curl -L -s -w "%{http_code}" -o /tmp/module.zip "$DOWNLOAD_URL")

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "• download_url: não foi possível baixar o ZIP (HTTP $HTTP_STATUS)" > /tmp/errors.txt
            exit 1
          fi

          unzip -tq /tmp/module.zip > /dev/null 2>&1 || {
            echo "• download_url: arquivo ZIP corrompido ou inválido" > /tmp/errors.txt
            exit 1
          }

          mkdir -p /tmp/module_extracted
          unzip -q /tmp/module.zip -d /tmp/module_extracted

          if [ ! -f "/tmp/module_extracted/module.json" ]; then
            echo "• ZIP não contém module.json na raiz do arquivo" > /tmp/errors.txt
            exit 1
          fi

          echo "✓ ZIP válido e module.json encontrado"

      - name: Cross-validate module.json vs registry entry
        run: |
          node << 'SCRIPT'
          const fs = require('fs')
          const entry      = JSON.parse(fs.readFileSync('/tmp/entry.json', 'utf-8'))
          const moduleJson = JSON.parse(fs.readFileSync('/tmp/module_extracted/module.json', 'utf-8'))

          const errors = []

          if (entry.id !== moduleJson.id) {
            errors.push(`• id: registry (${entry.id}) ≠ module.json (${moduleJson.id})`)
          }
          if (entry.version !== moduleJson.version) {
            errors.push(`• version: registry (${entry.version}) ≠ module.json (${moduleJson.version})`)
          }
          if (entry.author !== moduleJson.author) {
            errors.push(`• author: registry (${entry.author}) ≠ module.json (${moduleJson.author})`)
          }

          if (errors.length > 0) {
            fs.writeFileSync('/tmp/errors.txt', errors.join('\n'))
            console.error(errors.join('\n'))
            process.exit(1)
          }

          console.log(`✓ Cross-validação OK: ${entry.id} v${entry.version} by ${entry.author}`)
          SCRIPT

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE_ID=$(node -e "const e=require('/tmp/entry.json'); console.log(e.id)")
          VERSION=$(node -e "const e=require('/tmp/entry.json'); console.log(e.version)")

          gh pr merge "${{ github.event.number }}" --squash \
            --subject "feat: add ${MODULE_ID} v${VERSION} to registry"

          echo "✅ ${MODULE_ID} v${VERSION} adicionado ao registry"

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERRORS=""
          [ -f /tmp/errors.txt ] && ERRORS=$(cat /tmp/errors.txt)

          gh pr comment "${{ github.event.number }}" --body "$(cat << EOF
          ## ❌ Validação automática falhou

          ${ERRORS:-Ocorreu um erro inesperado durante a validação.}

          ---
          Corrija os problemas acima e faça um novo push para reacionar a validação.
          EOF
          )"
